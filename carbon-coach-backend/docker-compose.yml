version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://carbon_user:carbon_pass@db:5432/carbon_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=carbon-secret-key-12345
      - JWT_REFRESH_SECRET=carbon-refresh-secret-12345
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=carbon_user
      - POSTGRES_PASSWORD=carbon_pass
      - POSTGRES_DB=carbon_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon_user -d carbon_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
