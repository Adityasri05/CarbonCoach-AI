name: CarbonCoach Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'carbon-coach-backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'carbon-coach-backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'carbon-coach-backend/package-lock.json'

    - name: Install dependencies
      run: |
        cd carbon-coach-backend
        npm ci

    - name: Generate Prisma Client
      run: |
        cd carbon-coach-backend
        npx prisma generate

    - name: Run linting
      run: |
        cd carbon-coach-backend
        npm run lint --if-present

    - name: Run unit tests
      run: |
        cd carbon-coach-backend
        npm run test --if-present

    - name: Verify compilation build
      run: |
        cd carbon-coach-backend
        npm run build
